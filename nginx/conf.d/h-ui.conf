# h-ui панель управления Hysteria2
server {
    listen 443 ssl;
    http2 on;
    server_name HUI_SUBDOMAIN_PLACEHOLDER;

    ssl_certificate     /etc/letsencrypt/live/HUI_SUBDOMAIN_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/HUI_SUBDOMAIN_PLACEHOLDER/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    limit_req zone=panel burst=10 nodelay;

    # Разрешить доступ только с определённых IP (раскомментировать):
    # allow 1.2.3.4;
    # deny all;

    location / {
        proxy_pass         http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}
