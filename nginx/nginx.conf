user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;
    server_tokens   off;

    # Прячем что это nginx — отдаём пустой или кастомный Server header
    # (requires headers_more module — используем трюк через map)
    map $sent_http_server $hide_server { default ""; }

    # Блокируем типичных сканеров и ботов по User-Agent
    map $http_user_agent $bad_agent {
        default                    0;
        ~*masscan                  1;
        ~*zgrab                    1;
        ~*nuclei                   1;
        ~*nikto                    1;
        ~*sqlmap                   1;
        ~*nmap                     1;
        ~*(python-requests)/       1;
        ~*Go-http-client           1;
        ~*curl/[0-7]               1;   # старые curl — часто сканеры
    }

    # Защита от медленных атак
    client_body_timeout   12s;
    client_header_timeout 12s;
    send_timeout          10s;

    # Ограничение размера запросов
    client_max_body_size 16m;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=panel:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=assets:10m rate=100r/s;

    include /etc/nginx/conf.d/*.conf;
}
