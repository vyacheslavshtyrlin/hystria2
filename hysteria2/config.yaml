# Hysteria2 конфиг — также управляется через h-ui панель
listen: :443

tls:
  cert: /h-ui/data/cert.pem
  key:  /h-ui/data/key.pem

# Salamander XOR-обфускация UDP пакетов
# Делает трафик похожим на случайный шум — DPI не видит QUIC
obfs:
  type: salamander
  salamander:
    password: CHANGE_ME_OBFS_PASSWORD   # отдельный от auth пароль

auth:
  type: password
  password: CHANGE_ME_AUTH_PASSWORD

# Masquerade — если кто-то стучится по HTTP/HTTPS, сервер
# отвечает как обычный сайт, а не как прокси
masquerade:
  type: proxy
  proxy:
    # Выбирай домены которые РКН не заблокирует никогда:
    # microsoft.com, apple.com, github.com, cloudflare.com
    # НЕ используй: youtube, google (часто под замедлением)
    url: https://microsoft.com/
    rewriteHost: true
  # Логировать подозрительные попытки
  listenHTTP:  :80
  listenHTTPS: :8443

bandwidth:
  up: 1 gbps
  down: 1 gbps

# QUIC параметры — имитируем обычный браузер
quic:
  initStreamReceiveWindow:     8388608
  maxStreamReceiveWindow:      8388608
  initConnReceiveWindow:       20971520
  maxConnReceiveWindow:        20971520
